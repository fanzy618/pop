<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>POP 控制台 - 实时统计</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body data-page="stats">
  <header class="topbar">
    <h1>POP 控制台 <span id="app-version" class="version-badge"></span></h1>
    <p>Proxy of Proxy 运行面板</p>
    <nav class="tabs" aria-label="控制台导航">
      <a class="tab" href="/stats">实时统计</a>
      <a class="tab" href="/activities">访问记录</a>
      <a class="tab" href="/rules">规则管理</a>
      <a class="tab" href="/upstreams">上游管理</a>
      <a class="tab" href="/data">数据管理</a>
    </nav>
  </header>

  <main class="layout">
    <section class="card">
      <h2>实时统计</h2>
      <div id="stats" class="stats-grid">
        <div><span>并发中</span><strong id="st-inflight">-</strong></div>
        <div><span>总请求</span><strong id="st-total">-</strong></div>
        <div><span>错误数</span><strong id="st-errors">-</strong></div>
        <div><span>入站流量</span><strong id="st-in">-</strong></div>
        <div><span>出站流量</span><strong id="st-out">-</strong></div>
      </div>
    </section>

    <div class="charts-grid">
      <section class="card chart-card">
        <h2>CPU 使用率 (%)</h2>
        <canvas id="chart-cpu"></canvas>
      </section>
      <section class="card chart-card">
        <h2>内存使用</h2>
        <canvas id="chart-memory"></canvas>
      </section>
      <section class="card chart-card">
        <h2>流量统计</h2>
        <canvas id="chart-bytes"></canvas>
      </section>
      <section class="card chart-card">
        <h2>并发连接数</h2>
        <canvas id="chart-connections"></canvas>
      </section>
    </div>

    <p id="msg" class="msg"></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="/assets/app.js"></script>
</body>
</html>
