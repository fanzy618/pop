<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>POP 控制台</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <header class="topbar">
    <h1>POP 控制台</h1>
    <p>Proxy of Proxy 运行面板</p>
  </header>

  <main class="layout">
    <section class="card">
      <h2>实时统计</h2>
      <div id="stats" class="stats-grid">
        <div><span>并发中</span><strong id="st-inflight">-</strong></div>
        <div><span>总请求</span><strong id="st-total">-</strong></div>
        <div><span>错误数</span><strong id="st-errors">-</strong></div>
        <div><span>入站流量</span><strong id="st-in">-</strong></div>
        <div><span>出站流量</span><strong id="st-out">-</strong></div>
      </div>
    </section>

    <section class="card">
      <h2>实时活动</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>时间</th>
              <th>客户端</th>
              <th>方法</th>
              <th>目标</th>
              <th>动作</th>
              <th>状态</th>
              <th>耗时(ms)</th>
            </tr>
          </thead>
          <tbody id="activity-body"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2>规则管理</h2>
      <form id="rule-form" class="form-inline">
        <input name="id" placeholder="规则ID" required>
        <input name="order" type="number" min="1" value="1" required>
        <input name="pattern" placeholder="域名模式，如 *.example.com" required>
        <select name="action">
          <option value="DIRECT">DIRECT</option>
          <option value="PROXY">PROXY</option>
          <option value="BLOCK">BLOCK</option>
        </select>
        <input name="upstream_id" placeholder="上游ID(PROXY时填)">
        <input name="block_status" type="number" min="100" max="599" placeholder="阻断码(BLOCK时填)">
        <label><input name="enabled" type="checkbox" checked>启用</label>
        <button type="submit">新增规则</button>
      </form>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>顺序</th>
              <th>ID</th>
              <th>模式</th>
              <th>动作</th>
              <th>启用</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="rules-body"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2>上游管理</h2>
      <form id="upstream-form" class="form-inline">
        <input name="id" placeholder="上游ID" required>
        <input name="url" placeholder="http://host:port" required>
        <label><input name="enabled" type="checkbox" checked>启用</label>
        <button type="submit">新增上游</button>
      </form>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>URL</th>
              <th>启用</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="upstreams-body"></tbody>
        </table>
      </div>
    </section>

    <p id="msg" class="msg"></p>
  </main>

  <script src="/assets/app.js"></script>
</body>
</html>
