<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>POP 控制台 - 规则管理</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body data-page="rules">
  <header class="topbar">
    <h1>POP 控制台 <span id="app-version" class="version-badge"></span></h1>
    <p>Proxy of Proxy 运行面板</p>
    <nav class="tabs" aria-label="控制台导航">
      <a class="tab" href="/stats">实时统计</a>
      <a class="tab" href="/activities">实时活动</a>
      <a class="tab active" href="/rules">规则管理</a>
      <a class="tab" href="/upstreams">上游管理</a>
      <a class="tab" href="/data">数据管理</a>
    </nav>
  </header>

  <main class="layout">
    <section class="card">
      <h2>规则管理</h2>
      <p class="hint">规则会匹配域名及其所有子域名；多个规则同时命中时，模式更长的优先生效。</p>
      <form id="rule-form" class="form-inline">
        <input name="pattern" placeholder="域名模式，如 example.com" required>
        <select name="route_target" required>
          <option value="DIRECT">直连 (DIRECT)</option>
          <option value="BLOCK">阻断 (BLOCK 404)</option>
        </select>
        <label><input name="enabled" type="checkbox" checked>启用</label>
        <button type="submit">新增规则</button>
        <button id="rule-cancel" type="button" class="secondary hidden">取消编辑</button>
      </form>
      <div class="rules-toolbar">
        <input id="rule-search" type="search" placeholder="搜索规则关键词">
        <span id="rules-summary" class="hint">共 0 条</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>创建时间</th>
              <th>ID</th>
              <th>模式</th>
              <th>动作</th>
              <th>启用</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="rules-body"></tbody>
        </table>
      </div>
      <div class="pager">
        <button id="rules-prev-page" type="button" class="secondary">上一页</button>
        <span id="rules-page-info" class="hint">第 1 / 1 页</span>
        <button id="rules-next-page" type="button" class="secondary">下一页</button>
      </div>
    </section>

    <p id="msg" class="msg"></p>
  </main>

  <script src="/assets/app.js"></script>
</body>
</html>
