<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>POP 控制台 - 实时活动</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body data-page="activities">
  <header class="topbar">
    <h1>POP 控制台</h1>
    <p>Proxy of Proxy 运行面板</p>
    <nav class="tabs" aria-label="控制台导航">
      <a class="tab" href="/stats">实时统计</a>
      <a class="tab active" href="/activities">实时活动</a>
      <a class="tab" href="/rules">规则管理</a>
      <a class="tab" href="/upstreams">上游管理</a>
      <a class="tab" href="/data">数据管理</a>
    </nav>
  </header>

  <main class="layout">
    <section class="card">
      <h2>实时活动</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>时间</th>
              <th>客户端</th>
              <th>方法</th>
              <th>目标</th>
              <th>动作</th>
              <th>状态</th>
              <th>耗时(ms)</th>
            </tr>
          </thead>
          <tbody id="activity-body"></tbody>
        </table>
      </div>
    </section>

    <p id="msg" class="msg"></p>
  </main>

  <script src="/assets/app.js"></script>
</body>
</html>
